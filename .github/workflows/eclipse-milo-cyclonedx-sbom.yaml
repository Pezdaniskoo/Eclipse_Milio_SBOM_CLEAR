name: Eclipse Milo CycloneDX SBOM

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: eclipse-milo-cyclonedx-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_DIR: source
  SBOM_DIR: sbom/milo
  ARTIFACT_INPUT_DIR: sbom-input-milo
  VALIDATION_DIR: validation-results/milo
  QUALITY_DIR: quality-results/milo
  VULN_DIR: vulnerability-results/milo
  DTRACK_DIR: dependency-track-results/milo
  VEX_DIR: vex/milo
  BUILD_LOG_DIR: build-logs/milo

jobs:
  cyclonedx-sbom:
    name: Build, generate, validate and scan CycloneDX SBOMs
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository context
        run: |
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Ref: $GITHUB_REF"
          echo "Commit: $GITHUB_SHA"
          echo "Project directory: $PROJECT_DIR"

          echo
          echo "Root directory:"
          ls -la

          echo
          echo "Project directory:"
          ls -la "$PROJECT_DIR"

          echo
          echo "Detected Maven files:"
          find "$PROJECT_DIR" -maxdepth 6 -type f -name "pom.xml" | sort

          echo
          echo "Root Maven modules:"
          grep -n "<module>" "$PROJECT_DIR/pom.xml" || true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: source/**/pom.xml

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js for dep-scan helper tooling
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install base tools
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y jq unzip zip make rsync curl wget maven

          mkdir -p \
            "$SBOM_DIR/source" \
            "$SBOM_DIR/artifacts" \
            "$BUILD_LOG_DIR" \
            "$VALIDATION_DIR" \
            "$QUALITY_DIR" \
            "$VULN_DIR/grype" \
            "$VULN_DIR/trivy" \
            "$VULN_DIR/dependency-check" \
            "$VULN_DIR/github-dependency-review" \
            "$VULN_DIR/depscan" \
            "$VULN_DIR/osv-scanner" \
            "$VULN_DIR/cve-bin-tool" \
            "$VULN_DIR/sbom-utility" \
            "$DTRACK_DIR" \
            "$VEX_DIR"

          echo "Java:"
          java -version

          echo "Maven:"
          mvn -version

          echo "Go:"
          go version

          echo "Python:"
          python --version

          echo "Node:"
          node --version

          echo "NPM:"
          npm --version

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin
          syft version | tee "$BUILD_LOG_DIR/syft-version.txt"

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sudo sh -s -- -b /usr/local/bin
          grype version | tee "$BUILD_LOG_DIR/grype-version.txt"

      - name: Install Trivy
        run: |
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          trivy --version | tee "$BUILD_LOG_DIR/trivy-version.txt"

      - name: Install CycloneDX CLI
        run: |
          mkdir -p tools

          curl -L \
            https://github.com/CycloneDX/cyclonedx-cli/releases/download/v0.29.1/cyclonedx-linux-x64 \
            -o tools/cyclonedx

          chmod +x tools/cyclonedx
          sudo mv tools/cyclonedx /usr/local/bin/cyclonedx

          cyclonedx --version | tee "$BUILD_LOG_DIR/cyclonedx-cli-version.txt"

      - name: Install sbomqs
        run: |
          go install github.com/interlynk-io/sbomqs@latest
          sudo cp "$HOME/go/bin/sbomqs" /usr/local/bin/sbomqs
          sbomqs version || sbomqs --version || true

      - name: Install OSV-Scanner
        run: |
          go install github.com/google/osv-scanner/v2/cmd/osv-scanner@latest
          sudo cp "$HOME/go/bin/osv-scanner" /usr/local/bin/osv-scanner
          osv-scanner --version | tee "$BUILD_LOG_DIR/osv-scanner-version.txt" || true

      - name: Install OWASP dep-scan
        run: |
          python -m pip install --upgrade pip
          python -m pip install --user owasp-depscan || true
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          npm install -g @cyclonedx/cdxgen || true

          "$HOME/.local/bin/depscan" --version | tee "$BUILD_LOG_DIR/depscan-version.txt" || true
          cdxgen --version | tee "$BUILD_LOG_DIR/cdxgen-version-for-depscan.txt" || true

      - name: Install CVE Binary Tool from main branch
        run: |
          python -m pip install --upgrade pip
          python -m pip install --user --upgrade "git+https://github.com/ossf/cve-bin-tool@main"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

          "$HOME/.local/bin/cve-bin-tool" --version | tee "$BUILD_LOG_DIR/cve-bin-tool-version.txt" || true

      - name: Install sbom-utility
        run: |
          mkdir -p tools

          SBOM_UTILITY_VERSION=$(curl -s https://api.github.com/repos/CycloneDX/sbom-utility/releases/latest | jq -r '.tag_name')
          echo "Latest sbom-utility version: $SBOM_UTILITY_VERSION"

          curl -L \
            "https://github.com/CycloneDX/sbom-utility/releases/download/${SBOM_UTILITY_VERSION}/sbom-utility-${SBOM_UTILITY_VERSION}-linux-amd64.tar.gz" \
            -o tools/sbom-utility-linux-amd64.tar.gz

          tar -xzf tools/sbom-utility-linux-amd64.tar.gz -C tools

          SBOM_UTILITY_BIN=$(find tools -type f -name "sbom-utility" | head -n 1)
          chmod +x "$SBOM_UTILITY_BIN"
          sudo mv "$SBOM_UTILITY_BIN" /usr/local/bin/sbom-utility

          sbom-utility version | tee "$BUILD_LOG_DIR/sbom-utility-version.txt" || true

      - name: Cache OWASP Dependency-Check data
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check-data
          key: dependency-check-data-${{ runner.os }}
          restore-keys: |
            dependency-check-data-

      - name: Cache CVE Binary Tool data
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/cve-bin-tool
            ~/.local/share/cve-bin-tool
          key: cve-bin-tool-data-${{ runner.os }}
          restore-keys: |
            cve-bin-tool-data-

      - name: Generate source CycloneDX SBOM before build with cyclonedx-maven-plugin
        run: |
          mkdir -p "$SBOM_DIR/source" "$BUILD_LOG_DIR"

          cd "$PROJECT_DIR"

          mvn -B -ntp \
            org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom \
            -DschemaVersion=1.6 \
            -DoutputFormat=json \
            -DoutputName=eclipse-milo.source.cyclonedx \
            -DoutputDirectory="$GITHUB_WORKSPACE/$SBOM_DIR/source" \
            -DincludeCompileScope=true \
            -DincludeProvidedScope=true \
            -DincludeRuntimeScope=true \
            -DincludeSystemScope=true \
            -DincludeTestScope=true \
            -DincludeOptional=true \
            2>&1 | tee "$GITHUB_WORKSPACE/$BUILD_LOG_DIR/source-cyclonedx-generation.log"

      - name: Validate source CycloneDX SBOM schema with CycloneDX CLI
        run: |
          cyclonedx validate \
            --input-file "$SBOM_DIR/source/eclipse-milo.source.cyclonedx.json" \
            --input-format json \
            --input-version v1_6 \
            2>&1 | tee "$VALIDATION_DIR/source-cyclonedx-validation.log"

      - name: Validate source CycloneDX SBOM with sbom-utility
        run: |
          sbom-utility validate \
            -i "$SBOM_DIR/source/eclipse-milo.source.cyclonedx.json" \
            2>&1 | tee "$VULN_DIR/sbom-utility/source-sbom-utility-validation.txt" || true

      - name: Assess source CycloneDX SBOM quality with sbomqs
        run: |
          sbomqs score "$SBOM_DIR/source/eclipse-milo.source.cyclonedx.json" \
            2>&1 | tee "$QUALITY_DIR/source-sbomqs-score.txt"

          sbomqs score "$SBOM_DIR/source/eclipse-milo.source.cyclonedx.json" --json \
            > "$QUALITY_DIR/source-sbomqs-score.json" || true

      - name: Build Eclipse Milo
        run: |
          cd "$PROJECT_DIR"

          mvn -B -ntp -DskipTests package \
            2>&1 | tee "$GITHUB_WORKSPACE/$BUILD_LOG_DIR/maven-build.log"

      - name: Collect build artifacts after build
        if: always()
        run: |
          rm -rf "$ARTIFACT_INPUT_DIR"
          mkdir -p "$ARTIFACT_INPUT_DIR" "$BUILD_LOG_DIR"

          echo "Collecting JVM artifacts..."
          find "$PROJECT_DIR" -type f \( \
            -path "*/target/*.jar" -o \
            -path "*/target/*.war" -o \
            -path "*/target/*.zip" \
          \) \
            -not -path "*/node_modules/*" \
            -not -path "*/build/*" \
            -not -path "*/dist/*" \
            -print -exec cp --parents {} "$ARTIFACT_INPUT_DIR"/ \; || true

          echo
          echo "Collected artifacts:"
          find "$ARTIFACT_INPUT_DIR" -type f | sort | tee "$BUILD_LOG_DIR/collected-artifacts.txt"

          echo
          echo "Collected artifact count:"
          find "$ARTIFACT_INPUT_DIR" -type f | wc -l

      - name: Generate artifact CycloneDX SBOM after build with Syft
        run: |
          mkdir -p "$SBOM_DIR/artifacts" "$BUILD_LOG_DIR"

          if [ "$(find "$ARTIFACT_INPUT_DIR" -type f | wc -l)" -gt 0 ]; then
            syft dir:"$ARTIFACT_INPUT_DIR" \
              --source-name Eclipse-Milo-Build-Artifacts \
              --source-version "$GITHUB_SHA" \
              -o cyclonedx-json="$SBOM_DIR/artifacts/eclipse-milo.artifacts.syft.cyclonedx.json" \
              2>&1 | tee "$BUILD_LOG_DIR/artifact-cyclonedx-generation.log"
          else
            echo "No build artifacts found. Skipping artifact CycloneDX SBOM generation." | tee "$BUILD_LOG_DIR/artifact-cyclonedx-generation.log"
          fi

      - name: Validate artifact CycloneDX SBOM schema with CycloneDX CLI
        run: |
          if [ -f "$SBOM_DIR/artifacts/eclipse-milo.artifacts.syft.cyclonedx.json" ]; then
            cyclonedx validate \
              --input-file "$SBOM_DIR/artifacts/eclipse-milo.artifacts.syft.cyclonedx.json" \
              --input-format json \
              --input-version v1_6 \
              2>&1 | tee "$VALIDATION_DIR/artifact-cyclonedx-validation.log"
          else
            echo "Artifact SBOM not found. Skipping artifact SBOM validation." | tee "$VALIDATION_DIR/artifact-cyclonedx-validation.log"
          fi

      - name: Validate artifact CycloneDX SBOM with sbom-utility
        run: |
          if [ -f "$SBOM_DIR/artifacts/eclipse-milo.artifacts.syft.cyclonedx.json" ]; then
            sbom-utility validate \
              -i "$SBOM_DIR/artifacts/eclipse-milo.artifacts.syft.cyclonedx.json" \
              2>&1 | tee "$VULN_DIR/sbom-utility/artifact-sbom-utility-validation.txt" || true
          else
            echo "Artifact SBOM not found. Skipping sbom-utility validation." | tee "$VULN_DIR/sbom-utility/artifact-sbom-utility-validation.txt"
          fi

      - name: Assess artifact CycloneDX SBOM quality with sbomqs
        run: |
          if [ -f "$SBOM_DIR/artifacts/eclipse-milo.artifacts.syft.cyclonedx.json" ]; then
            sbomqs score "$SBOM_DIR/artifacts/eclipse-milo.artifacts.syft.cyclonedx.json" \
              2>&1 | tee "$QUALITY_DIR/artifact-sbomqs-score.txt"

            sbomqs score "$SBOM_DIR/artifacts/eclipse-milo.artifacts.syft.cyclonedx.json" --json \
              > "$QUALITY_DIR/artifact-sbomqs-score.json" || true
          else
            echo "Artifact SBOM not found. Skipping artifact SBOM quality assessment." | tee "$QUALITY_DIR/artifact-sbomqs-score.txt"
          fi

      - name: GitHub Dependency Review
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: critical

      - name: Record GitHub Dependency Review status
        if: always()
        run: |
          mkdir -p "$VULN_DIR/github-dependency-review"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "GitHub Dependency Review was executed as a pull_request check." > "$VULN_DIR/github-dependency-review/dependency-review-status.txt"
            echo "Detailed result is available in the GitHub Actions job log and PR checks." >> "$VULN_DIR/github-dependency-review/dependency-review-status.txt"
          else
            echo "GitHub Dependency Review skipped because this run is not a pull_request event." > "$VULN_DIR/github-dependency-review/dependency-review-status.txt"
          fi

          cat "$VULN_DIR/github-dependency-review/dependency-review-status.txt"

      - name: Grype vulnerability scan from source SBOM
        run: |
          grype "sbom:$SBOM_DIR/source/eclipse-milo.source.cyclonedx.json" \
            -o json \
            > "$VULN_DIR/grype/source-grype.json" || true

          grype "sbom:$SBOM_DIR/source/eclipse-milo.source.cyclonedx.json" \
            -o table \
            2>&1 | tee "$VULN_DIR/grype/source-grype.table.txt" || true

      - name: Grype vulnerability scan from artifact SBOM
        run: |
          if [ -f "$SBOM_DIR/artifacts/eclipse-milo.artifacts.syft.cyclonedx.json" ]; then
            grype "sbom:$SBOM_DIR/artifacts/eclipse-milo.artifacts.syft.cyclonedx.json" \
              -o json \
              > "$VULN_DIR/grype/artifact-grype.json" || true

            grype "sbom:$SBOM_DIR/artifacts/eclipse-milo.artifacts.syft.cyclonedx.json" \
              -o table \
              2>&1 | tee "$VULN_DIR/grype/artifact-grype.table.txt" || true
          else
            echo '{"matches":[]}' > "$VULN_DIR/grype/artifact-grype.json"
            echo "Artifact SBOM not found. Skipping artifact Grype scan." | tee "$VULN_DIR/grype/artifact-grype.table.txt"
          fi

      - name: Trivy filesystem vulnerability scan
        run: |
          trivy fs \
            --scanners vuln \
            --format json \
            --output "$VULN_DIR/trivy/trivy-fs.json" \
            --exit-code 0 \
            "$PROJECT_DIR" || true

          trivy fs \
            --scanners vuln \
            --format table \
            --exit-code 0 \
            "$PROJECT_DIR" \
            2>&1 | tee "$VULN_DIR/trivy/trivy-fs.table.txt" || true

      - name: Trivy SBOM vulnerability scan
        run: |
          trivy sbom \
            --format json \
            --output "$VULN_DIR/trivy/trivy-source-sbom.json" \
            --exit-code 0 \
            "$SBOM_DIR/source/eclipse-milo.source.cyclonedx.json" || true

          trivy sbom \
            --format table \
            --exit-code 0 \
            "$SBOM_DIR/source/eclipse-milo.source.cyclonedx.json" \
            2>&1 | tee "$VULN_DIR/trivy/trivy-source-sbom.table.txt" || true

          if [ -f "$SBOM_DIR/artifacts/eclipse-milo.artifacts.syft.cyclonedx.json" ]; then
            trivy sbom \
              --format json \
              --output "$VULN_DIR/trivy/trivy-artifact-sbom.json" \
              --exit-code 0 \
              "$SBOM_DIR/artifacts/eclipse-milo.artifacts.syft.cyclonedx.json" || true

            trivy sbom \
              --format table \
              --exit-code 0 \
              "$SBOM_DIR/artifacts/eclipse-milo.artifacts.syft.cyclonedx.json" \
              2>&1 | tee "$VULN_DIR/trivy/trivy-artifact-sbom.table.txt" || true
          fi

      - name: OWASP Dependency-Check scan
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mkdir -p "$VULN_DIR/dependency-check"

          cd "$PROJECT_DIR"

          if [ -n "$NVD_API_KEY" ]; then
            mvn -B -ntp \
              org.owasp:dependency-check-maven:check \
              -Dformat=ALL \
              -DfailBuildOnCVSS=11 \
              -DdataDirectory="$HOME/.dependency-check-data" \
              -DoutputDirectory="$GITHUB_WORKSPACE/$VULN_DIR/dependency-check" \
              -DnvdApiKey="$NVD_API_KEY" \
              2>&1 | tee "$GITHUB_WORKSPACE/$VULN_DIR/dependency-check/dependency-check.log" || true
          else
            mvn -B -ntp \
              org.owasp:dependency-check-maven:check \
              -Dformat=ALL \
              -DfailBuildOnCVSS=11 \
              -DdataDirectory="$HOME/.dependency-check-data" \
              -DoutputDirectory="$GITHUB_WORKSPACE/$VULN_DIR/dependency-check" \
              2>&1 | tee "$GITHUB_WORKSPACE/$VULN_DIR/dependency-check/dependency-check.log" || true
          fi

      - name: OWASP dep-scan
        continue-on-error: true
        run: |
          mkdir -p "$VULN_DIR/depscan"

          DEPSCAN_STATUS_FILE="$VULN_DIR/depscan/depscan-status.json"

          if command -v depscan >/dev/null 2>&1; then
            DEPSCAN_CMD="depscan"
          elif [ -x "$HOME/.local/bin/depscan" ]; then
            DEPSCAN_CMD="$HOME/.local/bin/depscan"
          else
            echo "depscan command not available. Skipping OWASP dep-scan." | tee "$VULN_DIR/depscan/depscan.log"
            echo '{"status":"skipped","reason":"depscan command not available"}' > "$DEPSCAN_STATUS_FILE"
            exit 0
          fi

          set +e
          "$DEPSCAN_CMD" \
            --src "$PROJECT_DIR" \
            --type java \
            --reports-dir "$VULN_DIR/depscan" \
            --report-name eclipse-milo-depscan \
            --no-vuln-table \
            2>&1 | tee "$VULN_DIR/depscan/depscan.log"
          DEPSCAN_EXIT=${PIPESTATUS[0]}
          set -e

          if [ "$DEPSCAN_EXIT" -eq 0 ]; then
            echo '{"status":"success"}' > "$DEPSCAN_STATUS_FILE"
          else
            jq -n --arg status "failed" --arg exit_code "$DEPSCAN_EXIT" --arg reason "OWASP dep-scan exited with non-zero code; see depscan.log" \
              '{status:$status, exit_code:$exit_code, reason:$reason}' > "$DEPSCAN_STATUS_FILE"
          fi

      - name: OSV-Scanner source scan
        run: |
          mkdir -p "$VULN_DIR/osv-scanner"

          osv-scanner scan source \
            -r "$PROJECT_DIR" \
            --format json \
            --output-file "$VULN_DIR/osv-scanner/osv-source.json" \
            2>&1 | tee "$VULN_DIR/osv-scanner/osv-source-json.log" || true

          osv-scanner scan source \
            -r "$PROJECT_DIR" \
            2>&1 | tee "$VULN_DIR/osv-scanner/osv-source.table.txt" || true

      - name: Record OSV-Scanner SBOM mode status
        run: |
          mkdir -p "$VULN_DIR/osv-scanner"

          {
            echo "OSV-Scanner SBOM mode was intentionally not used as a primary result in this workflow."
            echo "Reason: the current tested command did not reliably consume CycloneDX 1.6 JSON SBOM files in this project."
            echo "Primary OSV result is produced by the OSV-Scanner source scan step."
          } > "$VULN_DIR/osv-scanner/osv-sbom-mode-status.txt"

          echo '{"status":"skipped","reason":"SBOM mode not used; source mode is the primary OSV result"}' > "$VULN_DIR/osv-scanner/osv-sbom-mode-status.json"

      - name: CVE Binary Tool optimized SBOM scan
        timeout-minutes: 45
        continue-on-error: true
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          mkdir -p "$VULN_DIR/cve-bin-tool"

          LOG_FILE="$VULN_DIR/cve-bin-tool/cve-bin-tool-artifacts.log"
          JSON_FILE="$VULN_DIR/cve-bin-tool/cve-bin-tool-artifacts.json"
          CSV_FILE="$VULN_DIR/cve-bin-tool/cve-bin-tool-artifacts.csv"
          SBOM_FILE="$SBOM_DIR/artifacts/eclipse-milo.artifacts.syft.cyclonedx.json"

          echo "CVE Binary Tool optimized scan started." | tee "$LOG_FILE"
          echo "Mode: scan CycloneDX artifact SBOM instead of recursively scanning JAR files." | tee -a "$LOG_FILE"
          echo "Disabled data sources: OSV,GAD,EPSS to reduce update time and avoid unstable external fetches." | tee -a "$LOG_FILE"
          echo "NVD mode: json-mirror. Cache paths are restored by actions/cache when available." | tee -a "$LOG_FILE"

          if [ ! -f "$SBOM_FILE" ]; then
            echo "Artifact SBOM not found. Skipping CVE Binary Tool scan." | tee -a "$LOG_FILE"
            echo '{"status":"skipped","reason":"Artifact SBOM not found"}' > "$JSON_FILE"
            echo "status,reason" > "$CSV_FILE"
            echo "skipped,Artifact SBOM not found" >> "$CSV_FILE"
            exit 0
          fi

          if command -v cve-bin-tool >/dev/null 2>&1; then
            CVE_BIN_TOOL_CMD="cve-bin-tool"
          elif [ -x "$HOME/.local/bin/cve-bin-tool" ]; then
            CVE_BIN_TOOL_CMD="$HOME/.local/bin/cve-bin-tool"
          else
            echo "cve-bin-tool command not available. Skipping CVE Binary Tool." | tee -a "$LOG_FILE"
            echo '{"status":"skipped","reason":"cve-bin-tool command not available"}' > "$JSON_FILE"
            echo "status,reason" > "$CSV_FILE"
            echo "skipped,cve-bin-tool command not available" >> "$CSV_FILE"
            exit 0
          fi

          COMMON_ARGS=(
            --sbom cyclonedx
            --sbom-file "$SBOM_FILE"
            -d "OSV,GAD,EPSS"
            --nvd json-mirror
            --update daily
            --disable-version-check
          )

          if [ -n "$NVD_API_KEY" ]; then
            COMMON_ARGS+=(--nvd-api-key "$NVD_API_KEY")
          fi

          echo "Using command: $CVE_BIN_TOOL_CMD" | tee -a "$LOG_FILE"

          set +e

          timeout 40m "$CVE_BIN_TOOL_CMD" \
            "${COMMON_ARGS[@]}" \
            --format json \
            --output-file "$JSON_FILE" \
            2>&1 | tee -a "$LOG_FILE"

          JSON_EXIT=${PIPESTATUS[0]}
          echo "CVE Binary Tool JSON scan exit code: $JSON_EXIT" | tee -a "$LOG_FILE"

          timeout 40m "$CVE_BIN_TOOL_CMD" \
            "${COMMON_ARGS[@]}" \
            --format csv \
            --output-file "$CSV_FILE" \
            2>&1 | tee -a "$LOG_FILE"

          CSV_EXIT=${PIPESTATUS[0]}
          echo "CVE Binary Tool CSV scan exit code: $CSV_EXIT" | tee -a "$LOG_FILE"

          set -e

          if [ ! -f "$JSON_FILE" ]; then
            jq -n \
              --arg status "incomplete" \
              --arg reason "CVE Binary Tool did not complete or produced no JSON output. See log for details. This scanner is non-blocking." \
              --arg json_exit "$JSON_EXIT" \
              --arg csv_exit "$CSV_EXIT" \
              '{
                status: $status,
                reason: $reason,
                json_exit_code: $json_exit,
                csv_exit_code: $csv_exit
              }' > "$JSON_FILE"
          fi

          if [ ! -f "$CSV_FILE" ]; then
            echo "status,reason" > "$CSV_FILE"
            echo "incomplete,CVE Binary Tool did not complete or produced no CSV output" >> "$CSV_FILE"
          fi

          echo "CVE Binary Tool optimized SBOM scan completed in non-blocking mode." | tee -a "$LOG_FILE"

      - name: sbom-utility additional SBOM analysis
        run: |
          mkdir -p "$VULN_DIR/sbom-utility"

          sbom-utility resource list \
            -i "$SBOM_DIR/source/eclipse-milo.source.cyclonedx.json" \
            2>&1 | tee "$VULN_DIR/sbom-utility/source-sbom-utility-resources.txt" || true

          if [ -f "$SBOM_DIR/artifacts/eclipse-milo.artifacts.syft.cyclonedx.json" ]; then
            sbom-utility resource list \
              -i "$SBOM_DIR/artifacts/eclipse-milo.artifacts.syft.cyclonedx.json" \
              2>&1 | tee "$VULN_DIR/sbom-utility/artifact-sbom-utility-resources.txt" || true
          fi

      - name: Generate combined vulnerability tool summary
        if: always()
        run: |
          mkdir -p "$VULN_DIR"

          status_from_json() {
            local file="$1"
            local default_status="$2"
            if [ -f "$file" ]; then
              jq -r '.status // empty' "$file" 2>/dev/null | grep -q . && jq -r '.status' "$file" 2>/dev/null || echo "$default_status"
            else
              echo "missing"
            fi
          }

          exists_status() {
            local file="$1"
            if [ -s "$file" ]; then
              echo "success"
            else
              echo "missing"
            fi
          }

          GRYPE_SOURCE_TOTAL=$(jq '.matches | length' "$VULN_DIR/grype/source-grype.json" 2>/dev/null || echo 0)
          GRYPE_ARTIFACT_TOTAL=$(jq '.matches | length' "$VULN_DIR/grype/artifact-grype.json" 2>/dev/null || echo 0)

          GRYPE_STATUS=$(exists_status "$VULN_DIR/grype/source-grype.json")
          TRIVY_FS_STATUS=$(exists_status "$VULN_DIR/trivy/trivy-fs.json")
          TRIVY_SOURCE_SBOM_STATUS=$(exists_status "$VULN_DIR/trivy/trivy-source-sbom.json")
          TRIVY_ARTIFACT_SBOM_STATUS=$(exists_status "$VULN_DIR/trivy/trivy-artifact-sbom.json")
          OSV_SOURCE_STATUS=$(exists_status "$VULN_DIR/osv-scanner/osv-source.json")
          OSV_SBOM_STATUS=$(status_from_json "$VULN_DIR/osv-scanner/osv-sbom-mode-status.json" "skipped")
          DEPSCAN_STATUS=$(status_from_json "$VULN_DIR/depscan/depscan-status.json" "completed_or_report_generated")
          CVE_BINARY_TOOL_STATUS=$(status_from_json "$VULN_DIR/cve-bin-tool/cve-bin-tool-artifacts.json" "completed_or_report_generated")

          if ls "$VULN_DIR/dependency-check"/dependency-check-report.* >/dev/null 2>&1; then
            DEPENDENCY_CHECK_STATUS="success"
          elif grep -qi "BUILD FAILURE\|UpdateException\|NoDataException\|NVD Returned Status Code" "$VULN_DIR/dependency-check/dependency-check.log" 2>/dev/null; then
            DEPENDENCY_CHECK_STATUS="failed"
          else
            DEPENDENCY_CHECK_STATUS="unknown_or_log_only"
          fi

          if [ -f "$VULN_DIR/github-dependency-review/dependency-review-status.txt" ]; then
            GITHUB_DEP_REVIEW_STATUS=$(cat "$VULN_DIR/github-dependency-review/dependency-review-status.txt" | head -n 1)
          else
            GITHUB_DEP_REVIEW_STATUS="missing"
          fi

          {
            echo "# Eclipse Milo vulnerability analysis summary"
            echo
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Commit: $GITHUB_SHA"
            echo
            echo "## Tool status"
            echo
            echo "| Tool | Status | Notes |"
            echo "|---|---|---|"
            echo "| Grype | $GRYPE_STATUS | Source findings: $GRYPE_SOURCE_TOTAL, artifact findings: $GRYPE_ARTIFACT_TOTAL |"
            echo "| Trivy filesystem scan | $TRIVY_FS_STATUS | Broader/noisier scan of source tree |"
            echo "| Trivy source SBOM scan | $TRIVY_SOURCE_SBOM_STATUS | Comparable with Grype source SBOM scan |"
            echo "| Trivy artifact SBOM scan | $TRIVY_ARTIFACT_SBOM_STATUS | Comparable with Grype artifact SBOM scan |"
            echo "| OWASP Dependency-Check | $DEPENDENCY_CHECK_STATUS | Requires stable NVD access; NVD_API_KEY recommended |"
            echo "| GitHub Dependency Review | $GITHUB_DEP_REVIEW_STATUS | Runs only on pull_request events |"
            echo "| OWASP dep-scan | $DEPSCAN_STATUS | Uses corrected --report-name argument |"
            echo "| OSV-Scanner source mode | $OSV_SOURCE_STATUS | Primary OSV result |"
            echo "| OSV-Scanner SBOM mode | $OSV_SBOM_STATUS | Not used as primary result for CycloneDX 1.6 in this workflow |"
            echo "| CVE Binary Tool | $CVE_BINARY_TOOL_STATUS | Installed from main branch; optimized SBOM mode; OSV/GAD/EPSS disabled; non-blocking |"
            echo "| sbom-utility | success_if_validation_files_exist | SBOM validation/inspection, not primary vulnerability scanner |"
            echo
            echo "## Tool output directories"
            echo
            echo "- Grype: \`$VULN_DIR/grype/\`"
            echo "- Trivy: \`$VULN_DIR/trivy/\`"
            echo "- OWASP Dependency-Check: \`$VULN_DIR/dependency-check/\`"
            echo "- GitHub Dependency Review: \`$VULN_DIR/github-dependency-review/\`"
            echo "- OWASP dep-scan: \`$VULN_DIR/depscan/\`"
            echo "- OSV-Scanner: \`$VULN_DIR/osv-scanner/\`"
            echo "- CVE Binary Tool: \`$VULN_DIR/cve-bin-tool/\`"
            echo "- sbom-utility: \`$VULN_DIR/sbom-utility/\`"
            echo
            echo "## Notes"
            echo
            echo "- Build and SBOM validation are treated as core lifecycle checks."
            echo "- Vulnerability scanners run in report-only/non-blocking mode where external databases may be unstable."
            echo "- Dependency-Track upload is conditional on secrets being configured."
            echo "- VEX output is an under_investigation placeholder and does not claim affected/not_affected status."
          } > "$VULN_DIR/vulnerability-summary.md"

          cat "$VULN_DIR/vulnerability-summary.md"

      - name: Upload artifact SBOM to Dependency-Track if configured
        if: always()
        env:
          DTRACK_BASE_URL: ${{ secrets.DTRACK_BASE_URL }}
          DTRACK_API_KEY: ${{ secrets.DTRACK_API_KEY }}
          DTRACK_PROJECT_UUID: ${{ secrets.DTRACK_PROJECT_UUID }}
          DTRACK_PROJECT_NAME: ${{ secrets.DTRACK_PROJECT_NAME }}
          DTRACK_PROJECT_VERSION: ${{ secrets.DTRACK_PROJECT_VERSION }}
        run: |
          mkdir -p "$DTRACK_DIR"

          SBOM_FILE="$SBOM_DIR/artifacts/eclipse-milo.artifacts.syft.cyclonedx.json"

          if [ -z "$DTRACK_BASE_URL" ] || [ -z "$DTRACK_API_KEY" ]; then
            echo "Dependency-Track base URL or API key is not configured. Skipping upload." | tee "$DTRACK_DIR/dependency-track-upload.log"
            echo "Required secrets: DTRACK_BASE_URL, DTRACK_API_KEY." | tee -a "$DTRACK_DIR/dependency-track-upload.log"
            echo "Optional mode A: DTRACK_PROJECT_UUID." | tee -a "$DTRACK_DIR/dependency-track-upload.log"
            echo "Optional mode B: DTRACK_PROJECT_NAME, DTRACK_PROJECT_VERSION with autoCreate=true." | tee -a "$DTRACK_DIR/dependency-track-upload.log"
            exit 0
          fi

          if [ ! -f "$SBOM_FILE" ]; then
            echo "Artifact SBOM not found. Skipping Dependency-Track upload." | tee "$DTRACK_DIR/dependency-track-upload.log"
            exit 0
          fi

          echo "Uploading artifact SBOM to Dependency-Track..." | tee "$DTRACK_DIR/dependency-track-upload.log"

          if [ -n "$DTRACK_PROJECT_UUID" ]; then
            HTTP_CODE=$(curl -sS -o "$DTRACK_DIR/dependency-track-response.json" -w "%{http_code}" \
              -X POST "$DTRACK_BASE_URL/api/v1/bom" \
              -H "X-Api-Key: $DTRACK_API_KEY" \
              -F "project=$DTRACK_PROJECT_UUID" \
              -F "bom=@$SBOM_FILE")
          else
            PROJECT_NAME="${DTRACK_PROJECT_NAME:-Eclipse Milo}"
            PROJECT_VERSION="${DTRACK_PROJECT_VERSION:-$GITHUB_SHA}"

            HTTP_CODE=$(curl -sS -o "$DTRACK_DIR/dependency-track-response.json" -w "%{http_code}" \
              -X POST "$DTRACK_BASE_URL/api/v1/bom" \
              -H "X-Api-Key: $DTRACK_API_KEY" \
              -F "autoCreate=true" \
              -F "projectName=$PROJECT_NAME" \
              -F "projectVersion=$PROJECT_VERSION" \
              -F "bom=@$SBOM_FILE")
          fi

          echo "Dependency-Track HTTP status: $HTTP_CODE" | tee -a "$DTRACK_DIR/dependency-track-upload.log"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Dependency-Track upload completed successfully." | tee -a "$DTRACK_DIR/dependency-track-upload.log"
          else
            echo "Dependency-Track upload failed or was not accepted." | tee -a "$DTRACK_DIR/dependency-track-upload.log"
            cat "$DTRACK_DIR/dependency-track-response.json" || true
            exit 0
          fi

      - name: Produce OpenVEX document from Grype findings
        if: always()
        run: |
          mkdir -p "$VEX_DIR"

          PRODUCT_ID="pkg:generic/eclipse-milo@${GITHUB_SHA}"
          VEX_TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          VEX_ID="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/openvex/eclipse-milo"

          jq -n \
            --arg id "$VEX_ID" \
            --arg author "GitHub Actions" \
            --arg timestamp "$VEX_TIMESTAMP" \
            --arg product "$PRODUCT_ID" \
            --slurpfile src "$VULN_DIR/grype/source-grype.json" \
            --slurpfile art "$VULN_DIR/grype/artifact-grype.json" '
            {
              "@context": "https://openvex.dev/ns/v0.2.0",
              "@id": $id,
              "author": $author,
              "timestamp": $timestamp,
              "version": 1,
              "statements": (
                (
                  (($src[0].matches // []) + ($art[0].matches // []))
                  | map(.vulnerability.id)
                  | unique
                  | .[0:50]
                  | map({
                      "vulnerability": {"name": .},
                      "timestamp": $timestamp,
                      "products": [{"@id": $product}],
                      "status": "under_investigation",
                      "impact_statement": "Automatically generated OpenVEX placeholder from Grype findings. Vulnerability requires manual exploitability assessment before affected/not_affected status can be assigned."
                    })
                )
              )
            }' > "$VEX_DIR/eclipse-milo.openvex.json"

          echo "# Eclipse Milo OpenVEX summary" > "$VEX_DIR/vex-summary.md"
          echo >> "$VEX_DIR/vex-summary.md"
          echo "OpenVEX file: \`$VEX_DIR/eclipse-milo.openvex.json\`" >> "$VEX_DIR/vex-summary.md"
          echo >> "$VEX_DIR/vex-summary.md"
          echo "Generated statements:" >> "$VEX_DIR/vex-summary.md"
          jq '.statements | length' "$VEX_DIR/eclipse-milo.openvex.json" >> "$VEX_DIR/vex-summary.md"
          echo >> "$VEX_DIR/vex-summary.md"
          echo "Default status: \`under_investigation\`" >> "$VEX_DIR/vex-summary.md"
          echo >> "$VEX_DIR/vex-summary.md"
          echo "Reason: automatic pipeline cannot honestly mark findings as affected or not_affected without manual exploitability analysis." >> "$VEX_DIR/vex-summary.md"

          cat "$VEX_DIR/vex-summary.md"

      - name: Check OpenVEX document structure
        if: always()
        run: |
          VEX_FILE="$VEX_DIR/eclipse-milo.openvex.json"

          jq -e '
            .["@context"] == "https://openvex.dev/ns/v0.2.0"
            and (.["@id"] | type == "string")
            and (.author | type == "string")
            and (.timestamp | type == "string")
            and (.version | type == "number")
            and (.statements | type == "array")
            and all(.statements[]?;
              (.vulnerability.name | type == "string")
              and (.timestamp | type == "string")
              and (.products | type == "array")
              and (.status | IN("not_affected", "affected", "fixed", "under_investigation"))
            )
          ' "$VEX_FILE" \
            2>&1 | tee "$VEX_DIR/openvex-structure-check.log"

      - name: Generate traceability manifest
        if: always()
        run: |
          mkdir -p "$SBOM_DIR"

          jq -n \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg ref "$GITHUB_REF" \
            --arg commit "$GITHUB_SHA" \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg run_attempt "$GITHUB_RUN_ATTEMPT" \
            --arg project_dir "$PROJECT_DIR" \
            --arg source_sbom "$SBOM_DIR/source/eclipse-milo.source.cyclonedx.json" \
            --arg artifact_sbom "$SBOM_DIR/artifacts/eclipse-milo.artifacts.syft.cyclonedx.json" \
            --arg vuln_summary "$VULN_DIR/vulnerability-summary.md" \
            --arg dtrack "$DTRACK_DIR/dependency-track-upload.log" \
            --arg vex "$VEX_DIR/eclipse-milo.openvex.json" \
            '{
              repository: $repository,
              ref: $ref,
              commit: $commit,
              workflow_run_id: $run_id,
              workflow_run_attempt: $run_attempt,
              project_directory: $project_dir,
              lifecycle: {
                build: "Maven package",
                source_sbom_generation: "CycloneDX Maven Plugin",
                artifact_sbom_generation: "Syft",
                schema_validation: "CycloneDX CLI and sbom-utility",
                quality_assessment: "sbomqs",
                vulnerability_analysis: [
                  "Grype",
                  "Trivy",
                  "OWASP Dependency-Check",
                  "GitHub Dependency Review",
                  "OWASP dep-scan",
                  "OSV-Scanner",
                  "CVE Binary Tool",
                  "sbom-utility"
                ],
                tracking: "Dependency-Track optional upload",
                vex: "OpenVEX generated from Grype findings"
              },
              artifacts: {
                source_sbom: $source_sbom,
                artifact_sbom: $artifact_sbom,
                vulnerability_summary: $vuln_summary,
                dependency_track_upload_log: $dtrack,
                vex: $vex
              }
            }' > "$SBOM_DIR/manifest.json"

          cat "$SBOM_DIR/manifest.json"

      - name: Generate final summary
        if: always()
        run: |
          mkdir -p "$SBOM_DIR"

          {
            echo "# Eclipse Milo CycloneDX SBOM summary"
            echo
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Ref: $GITHUB_REF"
            echo "Commit: $GITHUB_SHA"
            echo "Project directory: $PROJECT_DIR"
            echo
            echo "## Lifecycle stage"
            echo
            echo "Current milestone: source SBOM + artifact SBOM + schema validation + quality assessment + artifact storage + multi-tool vulnerability analysis + Dependency-Track optional upload + OpenVEX generation"
            echo
            echo "## Tooling"
            echo
            echo "- Build: Maven"
            echo "- Source SBOM generation: CycloneDX Maven Plugin"
            echo "- Artifact SBOM generation: Syft"
            echo "- SBOM schema validation: CycloneDX CLI"
            echo "- Additional SBOM validation/analysis: sbom-utility"
            echo "- SBOM quality assessment: sbomqs"
            echo "- Artifact storage: actions/upload-artifact@v4"
            echo "- Vulnerability analysis: Grype"
            echo "- Vulnerability analysis: Trivy"
            echo "- Vulnerability analysis: OWASP Dependency-Check"
            echo "- Vulnerability analysis: GitHub Dependency Review"
            echo "- Vulnerability analysis: OWASP dep-scan"
            echo "- Vulnerability analysis: OSV-Scanner"
            echo "- Vulnerability analysis: CVE Binary Tool"
            echo "- Store, scan and track: Dependency-Track optional upload"
            echo "- VEX: OpenVEX generated from Grype findings"
            echo "- SBOM standard: CycloneDX"
            echo "- SBOM schema version: 1.6"
            echo "- Output format: JSON"
            echo
            echo "## Generated source SBOM files"
            if [ -d "$SBOM_DIR/source" ]; then
              find "$SBOM_DIR/source" -type f | sort | while read file; do
                size=$(wc -c < "$file")
                echo "- \`$file\` (${size} bytes)"
              done
            else
              echo "- No source SBOM files generated"
            fi
            echo
            echo "## Generated artifact SBOM files"
            if [ -d "$SBOM_DIR/artifacts" ]; then
              find "$SBOM_DIR/artifacts" -type f | sort | while read file; do
                size=$(wc -c < "$file")
                echo "- \`$file\` (${size} bytes)"
              done
            else
              echo "- No artifact SBOM files generated"
            fi
            echo
            echo "## Validation results"
            if [ -d "$VALIDATION_DIR" ]; then
              find "$VALIDATION_DIR" -type f | sort | while read file; do
                size=$(wc -c < "$file")
                echo "- \`$file\` (${size} bytes)"
              done
            else
              echo "- No validation results generated"
            fi
            echo
            echo "## Quality results"
            if [ -d "$QUALITY_DIR" ]; then
              find "$QUALITY_DIR" -type f | sort | while read file; do
                size=$(wc -c < "$file")
                echo "- \`$file\` (${size} bytes)"
              done
            else
              echo "- No quality results generated"
            fi
            echo
            echo "## Vulnerability results"
            if [ -d "$VULN_DIR" ]; then
              find "$VULN_DIR" -type f | sort | while read file; do
                size=$(wc -c < "$file")
                echo "- \`$file\` (${size} bytes)"
              done
            else
              echo "- No vulnerability results generated"
            fi
            echo
            echo "## Dependency-Track results"
            if [ -d "$DTRACK_DIR" ]; then
              find "$DTRACK_DIR" -type f | sort | while read file; do
                size=$(wc -c < "$file")
                echo "- \`$file\` (${size} bytes)"
              done
            else
              echo "- No Dependency-Track results generated"
            fi
            echo
            echo "## VEX results"
            if [ -d "$VEX_DIR" ]; then
              find "$VEX_DIR" -type f | sort | while read file; do
                size=$(wc -c < "$file")
                echo "- \`$file\` (${size} bytes)"
              done
            else
              echo "- No VEX results generated"
            fi
            echo
            echo "## Collected build artifacts"
            if [ -f "$BUILD_LOG_DIR/collected-artifacts.txt" ]; then
              echo "- Count: $(wc -l < "$BUILD_LOG_DIR/collected-artifacts.txt")"
            else
              echo "- Count: unavailable"
            fi
          } > "$SBOM_DIR/summary.md"

          cat "$SBOM_DIR/summary.md"

      - name: Upload full CycloneDX SBOM lifecycle results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eclipse-milo-cyclonedx-sbom-lifecycle-results
          path: |
            sbom/milo/
            build-logs/milo/
            validation-results/milo/
            quality-results/milo/
            vulnerability-results/milo/
            dependency-track-results/milo/
            vex/milo/
            sbom-input-milo/