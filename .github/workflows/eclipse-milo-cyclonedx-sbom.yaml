name: Eclipse Milo CycloneDX SBOM

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  PROJECT_DIR: source
  SBOM_DIR: sbom/milo

jobs:
  cyclonedx-sbom:
    name: Build and generate CycloneDX SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository context
        run: |
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Ref: $GITHUB_REF"
          echo "Commit: $GITHUB_SHA"
          echo "Project directory: $PROJECT_DIR"

          echo
          echo "Root directory:"
          ls -la

          echo
          echo "Project directory:"
          ls -la "$PROJECT_DIR"

          echo
          echo "Detected Maven files:"
          find "$PROJECT_DIR" -maxdepth 6 -type f -name "pom.xml" | sort

          echo
          echo "Root Maven modules:"
          grep -n "<module>" "$PROJECT_DIR/pom.xml" || true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: source/**/pom.xml

      - name: Build Eclipse Milo
        run: |
          mkdir -p build-logs/milo

          cd "$PROJECT_DIR"

          mvn -B -ntp -DskipTests package \
            2>&1 | tee "$GITHUB_WORKSPACE/build-logs/milo/maven-build.log"

      - name: Generate CycloneDX SBOM with cyclonedx-maven-plugin
        run: |
          mkdir -p "$SBOM_DIR"

          cd "$PROJECT_DIR"

          mvn -B -ntp \
            org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom \
            -DschemaVersion=1.6 \
            -DoutputFormat=json \
            -DoutputName=eclipse-milo.cyclonedx \
            -DoutputDirectory="$GITHUB_WORKSPACE/$SBOM_DIR" \
            2>&1 | tee "$GITHUB_WORKSPACE/build-logs/milo/cyclonedx-generation.log"

      - name: Collect build artifacts
        if: always()
        run: |
          rm -rf sbom-input-milo
          mkdir -p sbom-input-milo build-logs/milo

          echo "Collecting JVM artifacts..."
          find "$PROJECT_DIR" -type f \( \
            -path "*/target/*.jar" -o \
            -path "*/target/*.war" -o \
            -path "*/target/*.zip" \
          \) \
            -not -path "*/node_modules/*" \
            -not -path "*/build/*" \
            -not -path "*/dist/*" \
            -print -exec cp --parents {} sbom-input-milo/ \; || true

          echo
          echo "Collected artifacts:"
          find sbom-input-milo -type f | sort | tee build-logs/milo/collected-artifacts.txt

          echo
          echo "Collected artifact count:"
          find sbom-input-milo -type f | wc -l

      - name: Generate summary
        if: always()
        run: |
          mkdir -p "$SBOM_DIR"

          {
            echo "# Eclipse Milo CycloneDX SBOM summary"
            echo
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Ref: $GITHUB_REF"
            echo "Commit: $GITHUB_SHA"
            echo "Project directory: $PROJECT_DIR"
            echo
            echo "## Lifecycle stage"
            echo
            echo "Current milestone: build + CycloneDX SBOM generation"
            echo
            echo "## Tooling"
            echo
            echo "- Build: Maven"
            echo "- SBOM generation: cyclonedx-maven-plugin"
            echo "- SBOM standard: CycloneDX"
            echo "- SBOM schema version: 1.6"
            echo "- Output format: JSON"
            echo
            echo "## Generated SBOM files"
            echo
            if [ -d "$SBOM_DIR" ]; then
              find "$SBOM_DIR" -type f | sort | while read file; do
                size=$(wc -c < "$file")
                echo "- \`$file\` (${size} bytes)"
              done
            else
              echo "- No SBOM files generated"
            fi
            echo
            echo "## Collected build artifacts"
            echo
            if [ -f build-logs/milo/collected-artifacts.txt ]; then
              echo "- Count: $(wc -l < build-logs/milo/collected-artifacts.txt)"
            else
              echo "- Count: unavailable"
            fi
          } > "$SBOM_DIR/summary.md"

          cat "$SBOM_DIR/summary.md"

      - name: Upload CycloneDX SBOM results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eclipse-milo-cyclonedx-sbom-results
          path: |
            sbom/milo/
            build-logs/milo/
            sbom-input-milo/
