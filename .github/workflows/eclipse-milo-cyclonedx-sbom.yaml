name: Eclipse Milo CycloneDX SBOM

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  PROJECT_DIR: source
  SBOM_DIR: sbom/milo
  ARTIFACT_INPUT_DIR: sbom-input-milo

jobs:
  cyclonedx-sbom:
    name: Build, generate and validate CycloneDX SBOMs
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository context
        run: |
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Ref: $GITHUB_REF"
          echo "Commit: $GITHUB_SHA"
          echo "Project directory: $PROJECT_DIR"

          echo
          echo "Root directory:"
          ls -la

          echo
          echo "Project directory:"
          ls -la "$PROJECT_DIR"

          echo
          echo "Detected Maven files:"
          find "$PROJECT_DIR" -maxdepth 6 -type f -name "pom.xml" | sort

          echo
          echo "Root Maven modules:"
          grep -n "<module>" "$PROJECT_DIR/pom.xml" || true

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: source/**/pom.xml

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq unzip zip make rsync curl

          echo "Java:"
          java -version
          javac -version

          echo "Maven:"
          mvn -version

      - name: Install Syft for artifact SBOM generation
        run: |
          mkdir -p "$SBOM_DIR/source" "$SBOM_DIR/artifacts" build-logs/milo validation-results/milo

          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin
          syft version

      - name: Install CycloneDX CLI for SBOM schema validation
        run: |
          mkdir -p tools validation-results/milo

          curl -L \
            https://github.com/CycloneDX/cyclonedx-cli/releases/download/v0.29.1/cyclonedx-linux-x64 \
            -o tools/cyclonedx

          chmod +x tools/cyclonedx
          sudo mv tools/cyclonedx /usr/local/bin/cyclonedx

          cyclonedx --version

      - name: Generate source CycloneDX SBOM before build with cyclonedx-maven-plugin
        run: |
          mkdir -p "$SBOM_DIR/source" build-logs/milo

          cd "$PROJECT_DIR"

          mvn -B -ntp \
            org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom \
            -DschemaVersion=1.6 \
            -DoutputFormat=json \
            -DoutputName=eclipse-milo.source.cyclonedx \
            -DoutputDirectory="$GITHUB_WORKSPACE/$SBOM_DIR/source" \
            -DincludeCompileScope=true \
            -DincludeProvidedScope=true \
            -DincludeRuntimeScope=true \
            -DincludeSystemScope=true \
            -DincludeTestScope=true \
            -DincludeOptional=true \
            2>&1 | tee "$GITHUB_WORKSPACE/build-logs/milo/source-cyclonedx-generation.log"

      - name: Validate source CycloneDX SBOM schema
        run: |
          mkdir -p validation-results/milo

          cyclonedx validate \
            --input-file "$SBOM_DIR/source/eclipse-milo.source.cyclonedx.json" \
            --input-format json \
            --input-version v1_6 \
            2>&1 | tee validation-results/milo/source-cyclonedx-validation.log

      - name: Build Eclipse Milo
        run: |
          mkdir -p build-logs/milo

          cd "$PROJECT_DIR"

          mvn -B -ntp -DskipTests package \
            2>&1 | tee "$GITHUB_WORKSPACE/build-logs/milo/maven-build.log"

      - name: Collect build artifacts after build
        if: always()
        run: |
          rm -rf "$ARTIFACT_INPUT_DIR"
          mkdir -p "$ARTIFACT_INPUT_DIR" build-logs/milo

          echo "Collecting JVM artifacts..."
          find "$PROJECT_DIR" -type f \( \
            -path "*/target/*.jar" -o \
            -path "*/target/*.war" -o \
            -path "*/target/*.zip" \
          \) \
            -not -path "*/node_modules/*" \
            -not -path "*/build/*" \
            -not -path "*/dist/*" \
            -print -exec cp --parents {} "$ARTIFACT_INPUT_DIR"/ \; || true

          echo
          echo "Collected artifacts:"
          find "$ARTIFACT_INPUT_DIR" -type f | sort | tee build-logs/milo/collected-artifacts.txt

          echo
          echo "Collected artifact count:"
          find "$ARTIFACT_INPUT_DIR" -type f | wc -l

      - name: Generate artifact CycloneDX SBOM after build with Syft
        run: |
          mkdir -p "$SBOM_DIR/artifacts" build-logs/milo

          if [ "$(find "$ARTIFACT_INPUT_DIR" -type f | wc -l)" -gt 0 ]; then
            syft dir:"$ARTIFACT_INPUT_DIR" \
              --source-name Eclipse-Milo-Build-Artifacts \
              --source-version "$GITHUB_SHA" \
              -o cyclonedx-json="$SBOM_DIR/artifacts/eclipse-milo.artifacts.syft.cyclonedx.json" \
              2>&1 | tee build-logs/milo/artifact-cyclonedx-generation.log
          else
            echo "No build artifacts found. Skipping artifact CycloneDX SBOM generation." | tee build-logs/milo/artifact-cyclonedx-generation.log
          fi

      - name: Validate artifact CycloneDX SBOM schema
        run: |
          mkdir -p validation-results/milo

          if [ -f "$SBOM_DIR/artifacts/eclipse-milo.artifacts.syft.cyclonedx.json" ]; then
            cyclonedx validate \
              --input-file "$SBOM_DIR/artifacts/eclipse-milo.artifacts.syft.cyclonedx.json" \
              --input-format json \
              --input-version v1_6 \
              2>&1 | tee validation-results/milo/artifact-cyclonedx-validation.log
          else
            echo "Artifact SBOM not found. Skipping artifact SBOM validation." | tee validation-results/milo/artifact-cyclonedx-validation.log
          fi

      - name: Generate summary
        if: always()
        run: |
          mkdir -p "$SBOM_DIR"

          {
            echo "# Eclipse Milo CycloneDX SBOM summary"
            echo
            echo "Repository: $GITHUB_REPOSITORY"
            echo "Ref: $GITHUB_REF"
            echo "Commit: $GITHUB_SHA"
            echo "Project directory: $PROJECT_DIR"
            echo
            echo "## Lifecycle stage"
            echo
            echo "Current milestone: source SBOM before build + Maven build + artifact SBOM after build + CycloneDX schema validation"
            echo
            echo "## Tooling"
            echo
            echo "- Build: Maven"
            echo "- Source SBOM generation: CycloneDX Maven Plugin"
            echo "- Artifact SBOM generation: Syft"
            echo "- SBOM schema validation: CycloneDX CLI"
            echo "- SBOM standard: CycloneDX"
            echo "- SBOM schema version: 1.6"
            echo "- Output format: JSON"
            echo
            echo "## Generated source SBOM files"
            echo
            if [ -d "$SBOM_DIR/source" ]; then
              find "$SBOM_DIR/source" -type f | sort | while read file; do
                size=$(wc -c < "$file")
                echo "- \`$file\` (${size} bytes)"
              done
            else
              echo "- No source SBOM files generated"
            fi
            echo
            echo "## Generated artifact SBOM files"
            echo
            if [ -d "$SBOM_DIR/artifacts" ]; then
              find "$SBOM_DIR/artifacts" -type f | sort | while read file; do
                size=$(wc -c < "$file")
                echo "- \`$file\` (${size} bytes)"
              done
            else
              echo "- No artifact SBOM files generated"
            fi
            echo
            echo "## Validation results"
            echo
            if [ -d validation-results/milo ]; then
              find validation-results/milo -type f | sort | while read file; do
                size=$(wc -c < "$file")
                echo "- \`$file\` (${size} bytes)"
              done
            else
              echo "- No validation results generated"
            fi
            echo
            echo "## Collected build artifacts"
            echo
            if [ -f build-logs/milo/collected-artifacts.txt ]; then
              echo "- Count: $(wc -l < build-logs/milo/collected-artifacts.txt)"
            else
              echo "- Count: unavailable"
            fi
          } > "$SBOM_DIR/summary.md"

          cat "$SBOM_DIR/summary.md"

      - name: Upload CycloneDX SBOM results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eclipse-milo-cyclonedx-sbom-results
          path: |
            sbom/milo/
            build-logs/milo/
            validation-results/milo/
            sbom-input-milo/
